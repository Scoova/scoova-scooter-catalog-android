name: Release — Publish to Maven Central + GitHub Packages

# Catalog SDK publishes to PUBLIC Maven Central as v2.0.0 to replace
# the leaky v1.0.x artifacts (which bundled proprietary catalog data).
# The 2.0 release strips every model row + spec value; the data is
# fetched at runtime from the rider-platform server. Pushing 2.0 to
# Central means clients on `latest-version` automatically upgrade off
# the leaky 1.0.x versions.
#
# Sister SDKs (scoova-range-android, scoova-analysis-android) stay
# GitHub-Packages-only (private repos, auth-gated).
#
# Required repository (or org-level) secrets:
#   OSSRH_USERNAME   — Sonatype Central Portal token username
#   OSSRH_PASSWORD   — Sonatype Central Portal token password (RAW, NOT
#                      the base64-encoded form — the script does the
#                      base64 step itself)
#   SIGNING_KEY      — ASCII-armored PGP secret key
# Optional:
#   SIGNING_PASSWORD — passphrase for the PGP key (omit if passphrase-less)

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish info.scoo-va artifact to Maven Central + GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for `gh release create`
      packages: write   # for GitHub Packages publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: gradle

      - name: Bootstrap gradle wrapper
        run: |
          if [ ! -x "./gradlew" ]; then
            gradle wrapper --gradle-version 8.10.2
          fi

      - name: Stage release artifact (signed)
        env:
          SIGNING_KEY:       ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD:  ${{ secrets.SIGNING_PASSWORD }}
          GITHUB_ACTOR:      ${{ github.actor }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishReleasePublicationToLocalStagingRepository --no-daemon

      - name: Upload to Sonatype Central Portal
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: ./scripts/publish-to-central-portal.sh

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishReleasePublicationToGitHubPackagesRepository --no-daemon

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Published \`${{ github.ref_name }}\` to Maven Central + GitHub Packages." \
            --verify-tag
