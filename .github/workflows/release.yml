name: Release — Publish to GitHub Packages (internal)

# Internal-only publish — repo is private, artifact lands on GitHub
# Packages where consumers authenticate with a PAT (read:packages).
#
# Sonatype Central publish step was removed on 2026-06-08 — the
# scooter-catalog SDK exposed proprietary vehicle taxonomy publicly;
# range + analysis stayed private for symmetry. The historical 1.0.x
# Central artifacts (info.scoo-va:scoova-scooter-catalog-android:1.0.1) are
# immutable on the mirror network, but no new versions go to Central.
#
# Required secrets:
#   SIGNING_KEY      — ASCII-armored PGP key. GitHub Packages doesn't
#                      validate the signatures itself, but the signing
#                      step still runs so artifacts ship with .asc
#                      files. Lets us flip back to Central with a
#                      one-line workflow edit if the proprietary-data
#                      concern is ever resolved.
# Optional:
#   SIGNING_PASSWORD — passphrase for the PGP key (omit if passphrase-less).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish info.scoo-va artifact to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for `gh release create`
      packages: write   # for GitHub Packages publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: gradle

      - name: Bootstrap gradle wrapper
        run: |
          if [ ! -x "./gradlew" ]; then
            gradle wrapper --gradle-version 8.10.2
          fi

      - name: Stage release artifact (signed)
        env:
          SIGNING_KEY:       ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD:  ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishReleasePublicationToLocalStagingRepository --no-daemon

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishReleasePublicationToGitHubPackagesRepository --no-daemon

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Published \`${{ github.ref_name }}\` to GitHub Packages (internal). Pull with a PAT scoped \`read:packages\` against \`maven.pkg.github.com/Scoova/scoova-scooter-catalog-android\`." \
            --verify-tag
